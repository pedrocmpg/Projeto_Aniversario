<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contador-container">
        <h1>Nosso tempo Juntos</h1>
        <span id="meses">00</span>
        <span id="dias">00</span>
        <span id="horas">00</span>
        <span id="minutos">00</span>
        <span id="segundos">00</span>
    </div>
    <div class="mensagem-container">
        <p id="texto-mensagem">Cada segundo ao seu lado é especial! ❤️</p>
        <button id="btn-mensagem">Uma frase especial!</button>
    </div>
    
    <div class="coracao-animado">❤️</div>

    <div class="card-declaracao">
        <h3>Gerador de Declarações 💕</h3>
        
        <p id="texto-declaracao">"Clique no botão para ler o que sinto por você..."</p>
        
        <button id="btn-nova-frase">
            <span>💌</span> NOVA FRASE DE AMOR
        </button>
    </div>

<div id="container-estrelas"></div>
<script src="scripts.js"></script>
</body>
</html>
